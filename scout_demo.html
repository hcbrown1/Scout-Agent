<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout — Your Data Assistant | Maplewood USD</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EBF0F8;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* ── Header ── */
.hdr{background:linear-gradient(135deg,#12294F 0%,#1B4880 50%,#2563A8 100%);color:white;padding:18px 30px;display:flex;align-items:center;gap:18px;box-shadow:0 3px 12px rgba(0,0,0,.3);flex-shrink:0;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.hdr::before{content:'';position:absolute;right:80px;bottom:-40px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none}
.logo-box{width:54px;height:54px;background:linear-gradient(135deg,#F59E0B,#FBBF24);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;box-shadow:0 3px 10px rgba(245,158,11,.45)}
.logo-name{font-size:1.6rem;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.logo-sub{font-size:.82rem;font-weight:400;color:rgba(255,255,255,.65);margin-top:2px;letter-spacing:.2px}
.hdr-dist{margin-left:auto;text-align:right}
.hdr-dist-name{font-size:1rem;font-weight:600;opacity:.95}
.hdr-dist-year{display:inline-block;font-size:.75rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:2px 10px;margin-top:5px;letter-spacing:.3px}
/* ── Chat area ── */
.chat-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;background:linear-gradient(160deg,#EBF0F8 0%,#E2EAF5 100%)}
/* ── Message bubbles ── */
.msg{display:flex;gap:10px;max-width:90%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.scout{align-self:flex-start}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;margin-top:2px}
.scout .avatar{background:linear-gradient(135deg,#12294F,#2563A8);color:white;box-shadow:0 2px 6px rgba(18,41,79,.3)}
.user  .avatar{background:linear-gradient(135deg,#2563A8,#3B82F6);color:white;box-shadow:0 2px 6px rgba(37,99,168,.3)}
.bubble{border-radius:16px;padding:13px 17px;line-height:1.6;font-size:.875rem}
.scout .bubble{background:white;box-shadow:0 2px 8px rgba(0,0,0,.08);border-top-left-radius:4px;border-left:3px solid #F59E0B;max-width:100%}
.user  .bubble{background:linear-gradient(135deg,#1B4880,#2563A8);color:white;border-top-right-radius:4px;box-shadow:0 2px 8px rgba(27,72,128,.25)}
p{margin:5px 0}
strong{color:#111}
.user .bubble strong{color:white}
/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:10px 0}
.stat-card{background:white;border-radius:10px;padding:12px 14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid #CBD5E1;transition:transform .15s}
.stat-card:hover{transform:translateY(-1px)}
.stat-icon{font-size:1.3rem;margin-bottom:4px}
.stat-val{font-size:1.35rem;font-weight:800;color:#1B3A6B;word-break:break-word;line-height:1.2}
.stat-val.neg{color:#DC2626}
.stat-val.pos{color:#059669}
.stat-lbl{font-size:.7rem;color:#6B7280;margin-top:3px;line-height:1.3}
/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:10px 0;border-radius:10px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:linear-gradient(135deg,#F1F5FB,#E8EFF8);padding:9px 12px;text-align:left;font-weight:700;color:#1E3A5F;white-space:nowrap;letter-spacing:.2px}
tbody td{padding:8px 12px;border-top:1px solid #F1F5FB;color:#374151}
tbody tr:nth-child(even) td{background:#FAFBFD}
tbody tr:hover td{background:#EFF6FF}
.neg-amt{color:#DC2626;font-weight:700}
.pos-amt{color:#059669;font-weight:700}
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.72rem;font-weight:700;letter-spacing:.2px}
.badge.free{background:#DCFCE7;color:#166534}
.badge.reduced{background:#FEF3C7;color:#92400E}
.badge.paid{background:#EFF6FF;color:#1E40AF}
.rank-num{color:#9CA3AF;font-weight:700;font-size:.8rem}
/* ── Chart ── */
.chart-wrap{position:relative;height:230px;margin:12px 0;background:white;border-radius:10px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
/* ── Section heading ── */
.sec-head{font-size:.92rem;font-weight:800;color:#12294F;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.sec-head::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,#DBEAFE,transparent);border-radius:1px}
.insight{background:linear-gradient(135deg,#EFF6FF,#EBF5FF);border-left:3px solid #3B82F6;padding:9px 13px;border-radius:0 8px 8px 0;margin:8px 0;font-size:.82rem;color:#1E3A5F;box-shadow:0 1px 3px rgba(59,130,246,.1)}
.insight.warn{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-left-color:#F59E0B;color:#78350F}
.insight.good{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-left-color:#10B981;color:#064E3B}
/* ── Loading dots ── */
.dots{display:flex;align-items:center;gap:5px;padding:4px 0}
.dots span{width:8px;height:8px;border-radius:50%;background:#CBD5E1;animation:blink 1.2s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s;background:#93C5FD}
.dots span:nth-child(3){animation-delay:.4s;background:#F59E0B}
@keyframes blink{0%,80%,100%{opacity:.25;transform:scale(.85)}40%{opacity:1;transform:scale(1.1)}}
/* ── Input area ── */
.input-area{background:white;border-top:1px solid #E2E8F0;padding:10px 20px 14px;flex-shrink:0;box-shadow:0 -2px 8px rgba(0,0,0,.05)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);color:#1E40AF;border:1px solid #BFDBFE;border-radius:14px;padding:4px 12px;font-size:.75rem;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.chip:hover{background:linear-gradient(135deg,#DBEAFE,#BFDBFE);transform:translateY(-1px);box-shadow:0 2px 4px rgba(37,99,168,.15)}
.inp-row{display:flex;gap:8px;align-items:center}
#user-input{flex:1;padding:10px 18px;border:1.5px solid #CBD5E1;border-radius:24px;font-size:.875rem;outline:none;transition:all .15s;background:#FAFBFD}
#user-input:focus{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.12);background:white}
.btn-mic{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#F1F5F9,#E2E8F0);cursor:pointer;font-size:1.15rem;transition:all .15s;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-mic:hover{background:linear-gradient(135deg,#E2E8F0,#CBD5E1);transform:scale(1.05)}
.btn-mic.on{background:linear-gradient(135deg,#FEE2E2,#FECACA);animation:pulse 1s infinite;box-shadow:0 0 0 3px rgba(220,38,38,.15)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.btn-send{padding:10px 22px;background:linear-gradient(135deg,#1B4880,#2563A8);color:white;border:none;border-radius:24px;font-size:.875rem;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0;box-shadow:0 2px 6px rgba(27,72,128,.3)}
.btn-send:hover{background:linear-gradient(135deg,#12294F,#1B4880);transform:translateY(-1px);box-shadow:0 4px 10px rgba(27,72,128,.35)}
/* ── Responsive ── */
@media(max-width:600px){.msg{max-width:96%}.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

    <button class="btn-mic" id="mic-btn" title="Voice input">🎤</button>

</div>

//  HELPERS
// ═══════════════════════════════════════════════════════════════
const fmt$ = v => (v < 0 ? '-' : '') + '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtM = v => { const a=Math.abs(v),s=v<0?'-':''; if(a>=1e6) return s+'$'+(a/1e6).toFixed(2)+'M'; if(a>=1e3) return s+'$'+Math.round(a).toLocaleString(); return s+'$'+Math.round(a); };
const fmt$pos = v => '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = v => (v*100).toFixed(1) + '%';
const fmtN = v => v.toLocaleString();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function table(headers, rows, opts={}) {
  let cls = opts.cls || '';
  let h = headers.map(h => `<th>${esc(h)}</th>`).join('');
  let r = rows.map(row => '<tr>' + row.map((c,i) => {
    let cellClass = '';
    if (opts.negCols && opts.negCols.includes(i) && parseFloat(String(c).replace(/[$,]/g,'')) < 0) cellClass = ' class="neg-amt"';
    if (opts.posCols && opts.posCols.includes(i) && parseFloat(String(c).replace(/[$,]/g,'')) > 0) cellClass = ' class="pos-amt"';
    return `<td${cellClass}>${c}</td>`;
  }).join('') + '</tr>').join('');
  return `<div class="tbl-wrap"><table ${cls}><thead><tr>${h}</tr></thead><tbody>${r}</tbody></table></div>`;
}

function badge(status) {
  const labels = {free:'Free',reduced:'Reduced',paid:'Paid'};
  return `<span class="badge ${status}">${labels[status]||status}</span>`;
}

let chartCount = 0;
const pendingCharts = {};

function canvasChart(config) {
  const id = 'chart_' + (++chartCount);
  pendingCharts[id] = config;
  return `<div class="chart-wrap"><canvas id="${id}"></canvas></div>`;
}

function initPendingCharts() {
  for (const [id, cfg] of Object.entries(pendingCharts)) {
    const el = document.getElementById(id);
    if (el && !el._chartInit) {
      el._chartInit = true;
      new Chart(el, cfg);
      delete pendingCharts[id];
    }
  }
}

//  DATA LOOKUPS  
// ═══════════════════════════════════════════════════════════════
const schools = DATA.schools;
const schoolById = {};
schools.forEach(s => schoolById[s.id] = s);

function findSchool(q) {
  // Score each school by how many of its name words appear in the query
  // (excluding the word 'school') — highest score wins
  const lq = q.toLowerCase();
  let best = null, bestScore = 0;
  for (const s of schools) {
    const words = s.name.toLowerCase().split(' ').filter(w => w !== 'school');
    const score = words.reduce((acc, w) => acc + (new RegExp('\b' + w + '\b').test(lq) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = s; }
  }
  if (best && bestScore > 0) return best;
  // Type-level keywords (no specific school named)
  if (/all elementary|every elementary/.test(lq)) return {type:'elementary',multi:true};
  if (/all middle|every middle/.test(lq))         return {type:'middle',multi:true};
  if (/all high|every high/.test(lq))             return {type:'high',multi:true};
  return null;
}

function schoolsByType(type) {
  return schools.filter(s => s.type === type);
}

const negStudents = DATA.students.filter(s => s.balance < 0).sort((a,b) => a.balance - b.balance);
const posStudents = DATA.students.filter(s => s.balance > 0);
const allStudents = DATA.students;

// Totals
const districtTotals = {
  enrollment: allStudents.length,
  negative: negStudents.length,
  totalNegAmt: negStudents.reduce((a,s) => a+s.balance, 0),
  free: allStudents.filter(s=>s.benefit==='free').length,
  reduced: allStudents.filter(s=>s.benefit==='reduced').length,
  paid: allStudents.filter(s=>s.benefit==='paid').length,
  totalDeposits: DATA.monthlySummary.reduce((a,m) => a+m.onlinePaymentAmount, 0),
  totalLunchRevenue: DATA.monthlySummary.reduce((a,m) => a+m.lunchRevenue, 0),
  totalBreakfastRevenue: DATA.monthlySummary.reduce((a,m) => a+m.breakfastRevenue, 0),
  totalFees: Object.values(DATA.feeSummaryByCategory).reduce((a,v) => a+v.total, 0),
};

// ═══════════════════════════════════════════════════════════════
//  INTENT DETECTION
// ═══════════════════════════════════════════════════════════════
function detect(q) {
  const lq = q.toLowerCase();
  const school = findSchool(lq);

  const has = (...words) => words.some(w => lq.includes(w));
  const negKw   = () => has('negative','neg balance','owes','owe ','in the red','overdrawn','past due','low balance','behind','meal balance','balances');
  const frKw    = () => has('free','reduced','f/r','fr rate','benefit','eligib');
  const brkKw   = () => has('breakfast');
  const lunchKw = () => has('lunch','meal participation','meal rate');
  const partKw  = () => has('participat','attendance','rate','how many eat','who eat');
  const trendKw = () => has('trend','over time','monthly','by month','history','chart','graph','plot');
  const depKw   = () => has('deposit','payment','paid into','loaded','online pay','put money','fund','add money','top up');
  const feeKw   = () => has('fee','fees','charge','collect','revenue','field trip','athletic','yearbook','prom','parking','course fee','ap exam','cap and gown','graduation','band','orchestra','picture','supply','after school','before school','program');
  const ftKw    = () => has('field trip','trip');
  const athKw   = () => has('athlet','sport');
  const ybKw    = () => has('yearbook');
  const promKw  = () => has('prom');
  const summKw  = () => has('overview','summary','snapshot','how is','how are','tell me about','whats going on','status','dashboard');
  const compareKw = () => has('which school','what school','highest','lowest','most','least','top','bottom','best','worst','rank','compare','across','all schools','by school','each school','every school');

  // Overview / dashboard
  if (summKw() && !negKw() && !frKw() && !brkKw() && !lunchKw() && !depKw()) return {intent:'overview', school};

  // Negative balances
  if (negKw()) {
    if (school && !school.multi) return {intent:'neg_school', school};
    // "show/list students" type → individual list; comparison/default → school ranking
    if (!compareKw() && has('show','list','student','who has','names','pull','give me')) return {intent:'neg_list'};
    return {intent:'neg_compare'};
  }

  // F/R
  if (frKw()) {
    if (school && !school.multi) return {intent:'fr_school', school};
    return {intent:'fr_compare'};
  }

  // Participation
  if (partKw() || brkKw() || lunchKw()) {
    const isBrk = brkKw();
    const isLunch = lunchKw() && !brkKw();
    if (school && !school.multi) return {intent: isBrk ? 'part_bk_school' : 'part_ln_school', school};
    if (isBrk) return {intent:'part_bk_compare'};
    if (isLunch) return {intent:'part_ln_compare'};
    return {intent:'part_both_compare'};
  }

  // Payment / deposit trends or totals
  if (depKw()) {
    if (trendKw()) return {intent:'deposit_trend'};
    if (school && !school.multi) return {intent:'deposit_school', school};
    return {intent:'deposit_total'};
  }

  // Fees specific
  if (ftKw())  return {intent:'fee_detail', cat:'field_trip'};
  if (athKw()) return {intent:'fee_detail', cat:'athletics'};
  if (ybKw())  return {intent:'fee_detail', cat:'yearbook'};
  if (promKw()) return {intent:'fee_detail', cat:'prom'};

  // General fees / revenue
  if (feeKw()) {
    if (school && !school.multi) return {intent:'fee_school', school};
    if (trendKw()) return {intent:'deposit_trend'};
    return {intent:'fee_overview'};
  }

  // Trends without deposit context
  if (trendKw()) return {intent:'deposit_trend'};

  // Overview fallback
  return {intent:'fallback', school};
}

const handlers = {};

// ── OVERVIEW ──────────────────────────────────────────────────
handlers.overview = () => {
  const t = districtTotals;
  const frRate = ((t.free+t.reduced)/t.enrollment*100).toFixed(1);
  const negPct = (t.negative/t.enrollment*100).toFixed(1);
  let html = `<p>Here's a current snapshot of <strong>Maplewood Unified School District</strong> for the 2024–2025 school year:</p>`;
  html += `<div class="stat-grid">
    <div class="stat-card" style="border-top-color:#3B82F6"><div class="stat-icon">🏫</div><div class="stat-val">${fmtN(t.enrollment)}</div><div class="stat-lbl">Total Students</div></div>
    <div class="stat-card" style="border-top-color:#DC2626"><div class="stat-icon">⚠️</div><div class="stat-val neg">${fmtN(t.negative)}</div><div class="stat-lbl">Negative Balances</div></div>
    <div class="stat-card" style="border-top-color:#F59E0B"><div class="stat-icon">🍎</div><div class="stat-val">${frRate}%</div><div class="stat-lbl">Free & Reduced Rate</div></div>
    <div class="stat-card" style="border-top-color:#10B981"><div class="stat-icon">💳</div><div class="stat-val pos">${fmtM(t.totalDeposits)}</div><div class="stat-lbl">Meal Deposits YTD</div></div>
    <div class="stat-card" style="border-top-color:#8B5CF6"><div class="stat-icon">🧾</div><div class="stat-val pos">${fmtM(t.totalFees)}</div><div class="stat-lbl">Fees Collected YTD</div></div>
    <div class="stat-card" style="border-top-color:#06B6D4"><div class="stat-icon">📍</div><div class="stat-val">${schools.length}</div><div class="stat-lbl">Schools</div></div>
  </div>`;
  const topNeg = [...schools].sort((a,b) => b.negativeBalanceCount - a.negativeBalanceCount)[0];
  const topFR  = [...schools].sort((a,b) => (b.freeRate+b.reducedRate) - (a.freeRate+a.reducedRate))[0];
  html += `<div class="insight">⚠️ <strong>${topNeg.name}</strong> has the most students with negative balances (<strong>${topNeg.negativeBalanceCount}</strong>). <strong>${topFR.name}</strong> has the highest free & reduced rate at <strong>${fmtPct(topFR.freeRate+topFR.reducedRate)}</strong>.</div>`;
  html += `<p style="margin-top:8px;color:#6B7280;font-size:.8rem">Ask me about negative balances, free & reduced rates, meal participation, payment trends, or fee collections.</p>`;
  return html;
};

// ── NEGATIVE — COMPARE ALL SCHOOLS ───────────────────────────
handlers.neg_compare = () => {
  const sorted = [...schools].sort((a,b) => b.negativeBalanceCount - a.negativeBalanceCount);
  const top = sorted[0];
  let html = `<p><strong>${top.name}</strong> currently leads the district with <strong>${top.negativeBalanceCount} students</strong> carrying negative meal balances, totaling <strong>${fmt$(top.totalNegativeAmount)}</strong>.</p>`;
  html += `<div class="sec-head">Negative Balances by School</div>`;
  const rows = sorted.map((s,i) => [
    `<span class="rank-num">#${i+1}</span>`,
    esc(s.name), s.type.charAt(0).toUpperCase()+s.type.slice(1),
    fmtN(s.negativeBalanceCount),
    `<span class="neg-amt">${fmt$(s.totalNegativeAmount)}</span>`,
    fmtPct(s.negativeBalanceCount/s.enrollment),
  ]);
  html += table(['','School','Type','Students','Total Owed','% Enrollment'], rows);
  const totalOwed = schools.reduce((a,s)=>a+s.totalNegativeAmount,0);
  html += `<div class="insight">District-wide, <strong>${fmtN(districtTotals.negative)} students</strong> (${(districtTotals.negative/districtTotals.enrollment*100).toFixed(1)}% of enrollment) have negative balances totaling <strong>${fmt$(totalOwed)}</strong>.</div>`;
  return html;
};

// ── NEGATIVE — SPECIFIC SCHOOL ────────────────────────────────
handlers.neg_school = ({school}) => {
  const stus = negStudents.filter(s => s.schoolId === school.id).slice(0, 60);
  let html = `<p><strong>${school.name}</strong> has <strong>${school.negativeBalanceCount} students</strong> with negative meal balances, totaling <strong>${fmt$(school.totalNegativeAmount)}</strong>.</p>`;
  html += `<div class="sec-head">Students with Negative Balances — ${school.name}</div>`;
  const rows = stus.map(s => [
    esc(s.name), esc(s.grade === '0' ? 'K' : s.grade), badge(s.benefit),
    `<span class="neg-amt">${fmt$(s.balance)}</span>`
  ]);
  html += table(['Student','Grade','Status','Balance'], rows);

    html += `<p style="color:#6B7280;font-size:.8rem">Showing top ${stus.length} of ${school.negativeBalanceCount} students by balance amount.</p>`;
  }
  return html;
};

};

    `<span class="rank-num">#${i+1}</span>`,

    fmtN(s.freeCount), fmtN(s.reducedCount),
    fmtN(s.freeCount+s.reducedCount),

  ]);

// ── DEPOSIT TREND (chart) ─────────────────────────────────────
handlers.deposit_trend = () => {
  const months = DATA.monthlySummary;
  const labels = months.map(m => {
    const [y,mo] = m.month.split('-');
    return new Date(+y,+mo-1).toLocaleString('default',{month:'short',year:'2-digit'});
  });
  const deposits = months.map(m => m.onlinePaymentAmount);
  const lunchRev = months.map(m => m.lunchRevenue);
  const brkRev   = months.map(m => m.breakfastRevenue);
  const peak = months.reduce((a,m) => m.onlinePaymentAmount > a.onlinePaymentAmount ? m : a, months[0]);
  const peakLabel = new Date(...peak.month.split('-').map((v,i)=>i===1?+v-1:+v)).toLocaleString('default',{month:'long',year:'numeric'});
  let html = `<p>Here are the monthly financial trends for the 2024–2025 school year. <strong>${peakLabel}</strong> saw the highest online meal deposits at <strong>${fmt$pos(peak.onlinePaymentAmount)}</strong>.</p>`;
  html += canvasChart({
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Online Meal Deposits', data: deposits, borderColor:'#2C7BE5', backgroundColor:'rgba(44,123,229,.1)', tension:.3, fill:true, pointRadius:4 },
        { label: 'Lunch Revenue', data: lunchRev, borderColor:'#00B28A', backgroundColor:'rgba(0,178,138,.05)', tension:.3, fill:false, pointRadius:3 },
        { label: 'Breakfast Revenue', data: brkRev, borderColor:'#F6A623', backgroundColor:'rgba(246,166,35,.05)', tension:.3, fill:false, pointRadius:3 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:11}}},tooltip:{callbacks:{label: ctx => ' $' + ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2})}}},
      scales:{y:{ticks:{callback: v => '$'+v.toLocaleString()}},x:{ticks:{font:{size:10}}}}
    }
  });
  const totalDep = deposits.reduce((a,v)=>a+v,0);
  const totalLn  = lunchRev.reduce((a,v)=>a+v,0);
  const totalBrk = brkRev.reduce((a,v)=>a+v,0);
  html += `<div class="stat-grid">
    <div class="stat-card"><div class="stat-val pos">${fmt$pos(totalDep)}</div><div class="stat-lbl">Total Meal Deposits YTD</div></div>
    <div class="stat-card"><div class="stat-val pos">${fmt$pos(totalLn)}</div><div class="stat-lbl">Lunch Revenue YTD</div></div>
    <div class="stat-card"><div class="stat-val pos">${fmt$pos(totalBrk)}</div><div class="stat-lbl">Breakfast Revenue YTD</div></div>
  </div>`;
  return html;
};

// ── DEPOSIT TOTAL ─────────────────────────────────────────────
handlers.deposit_total = () => {
  const months = DATA.monthlySummary;
  const total = months.reduce((a,m)=>a+m.onlinePaymentAmount,0);
  const count = months.reduce((a,m)=>a+m.onlinePaymentCount,0);
  let html = `<p>The district has collected <strong>${fmt$pos(total)}</strong> in online meal deposits across <strong>${fmtN(count)} transactions</strong> this school year.</p>`;
  html += `<div class="sec-head">Monthly Meal Deposit Breakdown</div>`;
  const rows = months.map(m => {
    const [y,mo] = m.month.split('-');
    const label = new Date(+y,+mo-1).toLocaleString('default',{month:'long',year:'numeric'});
    return [label, fmtN(m.onlinePaymentCount), `<span class="pos-amt">${fmt$pos(m.onlinePaymentAmount)}</span>`, fmtN(m.lunchCount+m.breakfastCount)];
  });
  html += table(['Month','# Deposits','Amount Deposited','Meal Transactions'], rows);
  return html;
};

// ── DEPOSIT BY SCHOOL ─────────────────────────────────────────
handlers.deposit_school = ({school}) => {
  const s = DATA.mealPaymentSummaryBySchool[school.id];
  if (!s) return `<p>No payment data found for ${school.name}.</p>`;
  return `<p><strong>${school.name}</strong> has received <strong>${fmt$pos(s.total)}</strong> in online meal deposits across <strong>${fmtN(s.count)} transactions</strong> this school year.</p>`;
};

// ── FEE OVERVIEW ──────────────────────────────────────────────
handlers.fee_overview = () => {
  const cats = DATA.feeSummaryByCategory;
  const catLabels = {
    field_trip: 'Field Trips', athletics: 'Athletics', yearbook: 'Yearbooks',
    parking: 'Parking Permits', prom: 'Prom Tickets', course_fee: 'Course Fees',
    other: 'Other Fees'
  };
  const sorted = Object.entries(cats).sort((a,b) => b[1].total - a[1].total);
  const grandTotal = sorted.reduce((a,[,v])=>a+v.total,0);
  const grandCount = sorted.reduce((a,[,v])=>a+v.count,0);
  let html = `<p>The district has collected <strong>${fmt$pos(grandTotal)}</strong> in school fees across <strong>${fmtN(grandCount)} transactions</strong> this year.</p>`;
  html += `<div class="sec-head">Fee Collections by Category</div>`;
  const rows = sorted.map(([cat,v]) => [
    esc(catLabels[cat]||cat),
    fmtN(v.count),
    `<span class="pos-amt">${fmt$pos(v.total)}</span>`,
    fmt$pos(v.total/v.count),
  ]);
  html += table(['Category','Transactions','Total Collected','Avg per Transaction'], rows);
  return html;
};

// ── FEE DETAIL (by category) ──────────────────────────────────
handlers.fee_detail = ({cat}) => {
  const catLabels = {field_trip:'Field Trips',athletics:'Athletics',yearbook:'Yearbooks',prom:'Prom',parking:'Parking Permits',course_fee:'Course Fees'};
  const label = catLabels[cat] || cat;
  const schoolIds = Object.keys(DATA.feeSummaryBySchoolAndCategory);
  const rows = [];
  let grandTotal = 0, grandCount = 0;
  for (const sid of schoolIds) {
    const catData = DATA.feeSummaryBySchoolAndCategory[sid][cat];
    if (!catData) continue;
    const sch = schoolById[sid];
    rows.push([esc(sch ? sch.name : sid), fmtN(catData.count), `<span class="pos-amt">${fmt$pos(catData.total)}</span>`]);
    grandTotal += catData.total;
    grandCount += catData.count;
  }
  if (rows.length === 0) return `<p>No <strong>${label}</strong> fee data found.</p>`;
  rows.sort((a,b) => parseFloat(b[2].replace(/[^0-9.]/g,'')) - parseFloat(a[2].replace(/[^0-9.]/g,'')));
  let html = `<p>The district has collected <strong>${fmt$pos(grandTotal)}</strong> in <strong>${label}</strong> fees across ${fmtN(grandCount)} payments this school year.</p>`;
  html += `<div class="sec-head">${label} Collections by School</div>`;
  html += table(['School','# Payments','Total Collected'], rows);
  return html;
};

// ── FEE BY SCHOOL ─────────────────────────────────────────────
handlers.fee_school = ({school}) => {
  const catData = DATA.feeSummaryBySchoolAndCategory[school.id];
  if (!catData) return `<p>No fee data found for ${school.name}.</p>`;
  const catLabels = {field_trip:'Field Trips',athletics:'Athletics',yearbook:'Yearbooks',parking:'Parking Permits',prom:'Prom Tickets',course_fee:'Course Fees',other:'Other Fees'};
  const rows = Object.entries(catData).sort((a,b)=>b[1].total-a[1].total).map(([cat,v]) => [
    esc(catLabels[cat]||cat), fmtN(v.count), `<span class="pos-amt">${fmt$pos(v.total)}</span>`
  ]);
  const total = Object.values(catData).reduce((a,v)=>a+v.total,0);
  let html = `<p><strong>${school.name}</strong> has collected <strong>${fmt$pos(total)}</strong> in school fees this year.</p>`;
  html += `<div class="sec-head">Fee Breakdown — ${school.name}</div>`;
  html += table(['Category','# Payments','Total'], rows);
  return html;
};

handlers.fallback = ({school}) => {
  if (school && !school.multi) {
    const s = school;
    return `<p>Here's a quick overview for <strong>${s.name}</strong>:</p>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${fmtN(s.enrollment)}</div><div class="stat-lbl">Enrolled</div></div>
      <div class="stat-card"><div class="stat-val neg">${fmtN(s.negativeBalanceCount)}</div><div class="stat-lbl">Negative Balances</div></div>
      <div class="stat-card"><div class="stat-val">${fmtPct(s.freeRate+s.reducedRate)}</div><div class="stat-lbl">F/R Rate</div></div>
      <div class="stat-card"><div class="stat-val">${fmtPct(s.lunchParticipationRate)}</div><div class="stat-lbl">Lunch Part.</div></div>
    </div>
    <p style="color:#6B7280;font-size:.8rem;margin-top:8px">I can answer more specific questions about this school's balances, participation, payments, or fees. What would you like to know?</p>`;
  }
  return `<p>I can help you explore Maplewood USD's data. Try asking about:</p>
    <ul style="margin:8px 0 0 16px;line-height:2">
      <li>Negative meal balances by school</li>
      <li>Free & reduced eligibility rates</li>
      <li>Breakfast and lunch participation</li>
      <li>Online meal payment trends</li>
      <li>Fee collections (field trips, athletics, yearbooks, etc.)</li>
    </ul>`;
};

// ═══════════════════════════════════════════════════════════════
//  PROCESS QUERY
// ═══════════════════════════════════════════════════════════════
function processQuery(text) {
  const r = detect(text);
  const handler = handlers[r.intent];
  if (!handler) return handlers.fallback(r);
  try { return handler(r); } catch(e) { console.error(e); return `<p>Something went wrong processing that query. Try rephrasing it.</p>`; }
}

// ═══════════════════════════════════════════════════════════════
//  CHAT UI
// ═══════════════════════════════════════════════════════════════
const chat  = document.getElementById('chat');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const micBtn  = document.getElementById('mic-btn');
const chipsEl = document.getElementById('chips');

const SUGGESTIONS = [
  // Overview & balances
  'Give me a district overview',
  'Which school has the most negative balances?',
  'Which school has the worst meal balances?',
  'Show me students with negative balances',
  'Show students with negative balances at Maplewood High School',
  'Students with negative balances at Lincoln Elementary',
  'Students with negative balances at North Ridge High School',
  'Students with negative balances at Valley View Middle School',
  // Free & reduced
  'Show me free & reduced rates by school',
  'Which school has the highest free and reduced rate?',
  'Free and reduced rate at Riverside Elementary',
  'Free and reduced breakdown at Valley View Middle School',
  'Free and reduced rate at Sunnybrook Elementary',
  'How many students are on free lunch?',
  // Participation
  'What are the breakfast participation rates?',
  'Which school has the highest lunch participation?',
  'Breakfast participation at Sunnybrook Elementary',
  'Lunch participation by school',
  'Breakfast participation at Maplewood Middle School',
  'What is the lunch participation at Oakwood Elementary?',
  // Payments & deposits
  'Show me payment trends for the year',
  'What are meal deposits by month?',
  'How much has been collected in meal deposits?',
  'Meal deposits at North Ridge High School',
  // Fees
  'What fees has the district collected?',
  'Show me field trip collections',
  'How much in athletic fees?',
  'Yearbook sales by school',
  'Prom ticket revenue',
  'What fees has Maplewood High School collected?',
  'Show me fees collected at Oakwood Elementary',
];

let suggIndex = 0;

function renderChips() {
  const show = SUGGESTIONS.slice(suggIndex % SUGGESTIONS.length, suggIndex % SUGGESTIONS.length + 5);
  chipsEl.innerHTML = show.map(s => `<button class="chip" onclick="submitQuery('${esc(s)}')">${esc(s)}</button>`).join('');
  suggIndex += 5;
}

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const initial = role === 'scout' ? '🕵️' : 'HB';
  div.innerHTML = `<div class="avatar">${initial}</div><div class="bubble">${html}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addLoading() {
  return addMsg('scout', '<span class="dots"><span></span><span></span><span></span></span>');
}

function submitQuery(text) {
  if (!text.trim()) return;
  input.value = '';
  addMsg('user', `<p>${esc(text)}</p>`);
  const loadEl = addLoading();
  setTimeout(() => {
    const response = processQuery(text);
    loadEl.querySelector('.bubble').innerHTML = response;
    chat.scrollTop = chat.scrollHeight;
    initPendingCharts();
    renderChips();
  }, 400 + Math.random() * 300);
}

sendBtn.addEventListener('click', () => submitQuery(input.value));
input.addEventListener('keydown', e => { if (e.key === 'Enter') submitQuery(input.value); });

// ── Voice Input ───────────────────────────────────────────────
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    input.value = t;
    if (e.results[e.results.length-1].isFinal) {
      micBtn.classList.remove('on');
      submitQuery(t);
    }
  };
  recognition.onend = () => micBtn.classList.remove('on');
  recognition.onerror = () => micBtn.classList.remove('on');
  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('on')) { recognition.stop(); micBtn.classList.remove('on'); }
    else { recognition.start(); micBtn.classList.add('on'); }
  });
} else {
  micBtn.title = 'Voice input not supported in this browser';
  micBtn.style.opacity = '.4';
}

// ── Welcome message ───────────────────────────────────────────
window.addEventListener('load', () => {
  const t = districtTotals;
  const frRate = ((t.free+t.reduced)/t.enrollment*100).toFixed(1);
  addMsg('scout', `<p>👋 Hi! I'm <strong>Scout</strong>, your data assistant for <strong>Maplewood Unified School District</strong>. I have full visibility into the 2024–2025 school year across all 8 schools.</p>
  <div class="stat-grid">
    <div class="stat-card" style="border-top-color:#3B82F6"><div class="stat-icon">🏫</div><div class="stat-val">${fmtN(t.enrollment)}</div><div class="stat-lbl">Students Enrolled</div></div>
    <div class="stat-card" style="border-top-color:#DC2626"><div class="stat-icon">⚠️</div><div class="stat-val neg">${fmtN(t.negative)}</div><div class="stat-lbl">Negative Balances</div></div>
    <div class="stat-card" style="border-top-color:#F59E0B"><div class="stat-icon">🍎</div><div class="stat-val">${frRate}%</div><div class="stat-lbl">Free & Reduced Rate</div></div>
    <div class="stat-card" style="border-top-color:#10B981"><div class="stat-icon">💳</div><div class="stat-val pos">${fmtM(t.totalDeposits)}</div><div class="stat-lbl">Meal Deposits YTD</div></div>
  </div>
  <p style="color:#6B7280;font-size:.78rem;margin-top:6px">Ask me anything about meal balances, participation, payments, or fee collections — or tap 🎤 to ask by voice.</p>`);
  renderChips();
});

window.submitQuery = submitQuery;
</script>
</body>
</html>
